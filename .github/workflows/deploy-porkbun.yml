name: Build and push to deploy branch (Porkbun)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Push dist/ to deploy branch
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: deploy
          folder: dist
          single-commit: true
